<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TechEvents Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">TechEvents Hub</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="rsvp-management.html">Manage RSVPs</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Add New Event</h2>
        <form id="add-event-form">
            <input type="text" id="event-title" placeholder="Event Title" required>
            <input type="date" id="event-date" required>
            <textarea id="event-description" placeholder="Event Description" required></textarea>
            <button type="submit">Add Event</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2023 TechEvents Hub. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('add-event-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('event-title').value;
            const date = document.getElementById('event-date').value;
            const description = document.getElementById('event-description').value;

            // In a real application, you would send this data to a backend
            console.log('New event:', { title, date, description });
            alert('Event added successfully!');

            // Clear the form
            this.reset();
        });
    </script>
</body>
</html>
